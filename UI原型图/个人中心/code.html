<style>
        body {
            background: linear-gradient(135deg, #f4fafd 0%, #e0f7f3 30%, #fff9e6 70%, #fdecf2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(73, 234, 206, 0.1);
            box-shadow: 0 8px 32px 0 rgba(73, 234, 206, 0.05);
        }
        .custom-input {
            background-color: #FFF9E6 !important;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }
        .custom-input:focus {
            border-color: #49EACE !important;
            outline: none;
            box-shadow: 0 0 0 4px rgba(73, 234, 206, 0.1);
        }

<body class="font-body-md text-on-surface">
<!-- TopNavBar -->
<header class="w-full sticky top-0 z-50 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md shadow-sm dark:shadow-none">

<div class="flex items-center gap-md">
<button class="p-base rounded-lg hover:bg-primary-container/10 active:scale-95 transition-all">
<span class="material-symbols-outlined text-primary" data-icon="person">person</span>
</button>
</div>
</div>
</header>

</div>
<button class="absolute bottom-1 right-1 bg-primary text-on-primary p-2 rounded-full shadow-lg hover:scale-110 active:scale-95 transition-transform" title="更新头像">
<span class="material-symbols-outlined text-[20px]" data-icon="edit">edit</span>
</button>
</div>
<!-- Basic Info -->

<div class="flex flex-col md:flex-row md:items-center justify-between gap-md">
<div>

<p class="font-body-md text-on-surface-variant">学号: 2024****001</p>

<span class="material-symbols-outlined" data-icon="edit_square">edit_square</span>

<span class="font-body-md">宿舍: <span class="text-on-surface font-semibold">南区1号楼 301</span></span>
</div>
<div class="flex items-center gap-sm text-on-surface-variant">

<script>
        // Simple hover interaction for cards
        document.querySelectorAll('.glass-card').forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.style.transform = 'translateY(-4px)';
                card.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'translateY(0)';
            });
        });
    </script>
