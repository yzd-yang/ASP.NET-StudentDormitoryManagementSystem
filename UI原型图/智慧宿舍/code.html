<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Input focus animations
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.classList.add('bg-white');
                    input.parentElement.classList.remove('bg-surface-container-low/50');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.classList.add('bg-surface-container-low/50');
                    input.parentElement.classList.remove('bg-white');
                });
            });

            // Verification Code refresh simulation
            const vcodeBox = document.querySelector('.col-span-5, .col-span-4');
            if(vcodeBox) {
                vcodeBox.addEventListener('click', () => {
                    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                    let newCode = '';
                    for(let i=0; i<4; i++) {
                        newCode += chars.charAt(Math.floor(Math.random() * chars.length)) + (i < 3 ? ' ' : '');
                    }
                    vcodeBox.querySelector('span').textContent = newCode;
                    
                    // Add a quick feedback animation
                    vcodeBox.classList.add('scale-95');
                    setTimeout(() => vcodeBox.classList.remove('scale-95'), 100);
                });
            }
        });
    </script>
