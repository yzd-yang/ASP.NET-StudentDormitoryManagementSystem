<style>
        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(135deg, #f4fafd 0%, #e8fcf9 50%, #fff9e6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(73, 234, 206, 0.1);
            box-shadow: 0 8px 32px 0 rgba(73, 234, 206, 0.05);
        }

        .input-glow:focus {
            outline: none;
            border-color: #49eace;
            box-shadow: 0 0 0 4px rgba(73, 234, 206, 0.15);
        }

        .macaron-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: move 20s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="p-4 md:p-0">
<!-- Atmospheric Background Blobs -->
<div class="macaron-bg">
<div class="blob bg-[#49eace] w-[500px] h-[500px] -top-64 -left-64"></div>
<div class="blob bg-[#fff9e6] w-[400px] h-[400px] bottom-0 right-0" style="animation-delay: -5s;"></div>
<div class="blob bg-[#ffe6f2] w-[300px] h-[300px] top-1/2 left-1/3" style="animation-delay: -10s;"></div>
</div>
<main class="w-full max-w-md">
<!-- Brand Header -->
<div class="text-center mb-base">
<h1 class="font-headline-xl text-headline-xl text-primary tracking-tight">SmartDorm</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">智慧公寓 · 重置您的访问权限</p>
</div>
<!-- Reset Password Card -->
<div class="glass-card rounded-xl p-lg space-y-md">
<div class="space-y-xs">
<h2 class="font-headline-md text-headline-md text-on-surface">设置新密码</h2>
<p class="font-label-md text-label-md text-outline">身份验证成功，请设置您的新登录密码</p>
</div>
<form class="space-y-md" id="resetForm">
<!-- ID Number -->
<div class="space-y-xs hidden">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">学号 / 工号</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">badge</span>
<input class="w-full pl-12 pr-4 py-3 border border-outline-variant rounded-lg font-body-md text-body-md input-glow transition-all bg-[#fff9e6]" placeholder="请输入学号或教工号" type="text">
</div>
</div>
<!-- Mobile Number -->
<div class="space-y-xs hidden">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">手机号</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">smartphone</span>
<input class="w-full pl-12 pr-4 py-3 border border-outline-variant rounded-lg font-body-md text-body-md input-glow transition-all bg-[#fff9e6]" placeholder="请输入绑定的手机号码" type="tel">
</div>
</div>
<!-- Verification Code -->
<div class="space-y-xs hidden">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">图形验证码</label>
<div class="flex gap-3">
<div class="relative group flex-1">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">verified</span>
<input class="w-full pl-12 pr-4 py-3 border border-outline-variant rounded-lg font-body-md text-body-md input-glow transition-all bg-[#fff9e6]" placeholder="请输入图形验证码" type="text">
</div>
<div class="w-32 h-12 bg-secondary-container rounded-lg flex items-center justify-center cursor-pointer hover:brightness-95 transition-all overflow-hidden">
<span class="text-on-secondary-container font-bold tracking-widest italic">4 K 8 R</span>
</div>
</div>
</div>
<!-- New Password -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">设置新密码</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-3 border border-outline-variant rounded-lg font-body-md text-body-md input-glow transition-all bg-[#fff9e6]" placeholder="8-20位字母及数字组合" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Confirm New Password -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">确认新密码</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock_reset</span>
<input class="w-full pl-12 pr-12 py-3 border border-outline-variant rounded-lg font-body-md text-body-md input-glow transition-all bg-[#fff9e6]" placeholder="请再次输入新密码" type="password">
</div>
</div>
<!-- Reset Button -->
<div class="space-y-md mt-sm">
<button class="w-full bg-primary-container text-on-primary-container py-4 rounded-lg font-headline-md text-headline-md font-bold shadow-md hover:brightness-105 active:scale-[0.98] transition-all flex items-center justify-center gap-2 hidden" id="verifyBtn" type="button" disabled=""><span class="material-symbols-outlined animate-spin">progress_activity</span> 正在验证...</button>
<button class="w-full bg-primary-container text-on-primary-container py-4 rounded-lg font-headline-md text-headline-md font-bold shadow-md hover:brightness-105 active:scale-[0.98] transition-all flex items-center justify-center gap-2" id="finalResetBtn" type="submit">
<span class="">重置密码</span>
<span class="material-symbols-outlined">lock_reset</span>
</button>
</div>
</form>
<!-- Footer Links -->
<div class="pt-base text-center">
<a class="inline-flex items-center gap-1 font-label-md text-label-md text-primary hover:underline decoration-2 underline-offset-4" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                    返回登录
                </a>
</div>
</div>
<!-- Visual Decoration -->
<div class="mt-lg flex justify-center gap-md opacity-60">
<div class="flex items-center gap-1 text-on-surface-variant font-label-sm text-label-sm">
<span class="material-symbols-outlined text-[16px]">verified</span>
                安全身份校验
            </div>
<div class="flex items-center gap-1 text-on-surface-variant font-label-sm text-label-sm">
<span class="material-symbols-outlined text-[16px]">lock_clock</span>
                加密传输保障
            </div>
</div>
</main>
<script>
        // Micro-interaction for "Get Code" button
        const codeBtn = document.getElementById('getCodeBtn');
        let countdown = 0;
        
        codeBtn.addEventListener('click', () => {
            if (countdown > 0) return;
            
            // Simulating API call success
            countdown = 60;
            codeBtn.disabled = true;
            codeBtn.classList.add('opacity-50', 'cursor-not-allowed');
            
            const timer = setInterval(() => {
                countdown--;
                codeBtn.innerText = `重新获取 (${countdown}s)`;
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    codeBtn.innerText = '获取验证码';
                    codeBtn.disabled = false;
                    codeBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            }, 1000);
        });

        // Form Submission visual feedback
        document.getElementById('resetForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> 正在重置...';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> 重置成功';
                btn.classList.replace('bg-primary-container', 'bg-secondary-container');
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-secondary-container', 'bg-primary-container');
                }, 2000);
            }, 1500);
        });

        // Background parallax effect
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            
            document.querySelectorAll('.blob').forEach((blob, index) => {
                const factor = (index + 1) * 0.5;
                blob.style.transform = `translate(${moveX * factor}px, ${moveY * factor}px)`;
            });
        });
    </script>
<script>
(function() {
  const verifyBtn = document.getElementById('verifyBtn');
  const finalResetBtn = document.getElementById('finalResetBtn');
  const form = document.getElementById('resetForm');
  const fields = form.querySelectorAll('.space-y-xs');
  
  verifyBtn.addEventListener('click', () => {
    // Mock verification success
    verifyBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> 正在验证...';
    verifyBtn.disabled = true;
    
    setTimeout(() => {
      // Hide identity fields (1st, 2nd, 3rd children)
      fields[0].classList.add('hidden');
      fields[1].classList.add('hidden');
      fields[2].classList.add('hidden');
      
      // Show password fields (4th, 5th children)
      fields[3].classList.remove('hidden');
      fields[4].classList.remove('hidden');
      
      // Toggle buttons
      verifyBtn.classList.add('hidden');
      finalResetBtn.classList.remove('hidden');
      
      // Update header text
      document.querySelector('h2').innerText = '设置新密码';
      document.querySelector('h2 + p').innerText = '身份验证成功，请设置您的新登录密码';
    }, 1000);
  });
})();
</script>



</body></html>
